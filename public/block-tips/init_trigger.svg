<svg xmlns="http://www.w3.org/2000/svg" width="440" height="240" viewBox="0 0 440 240" role="img" aria-label="初始化触发器">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F8FBFF" />
      <stop offset="100%" stop-color="#EEF4FF" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#9EB4D9" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect x="6" y="6" width="428" height="228" rx="14" fill="url(#bg)" stroke="#A8BAD8"/>
  <text x="20" y="34" font-size="16" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,PingFang SC,Microsoft YaHei,sans-serif" fill="#2A3E64" font-weight="700">初始化触发器</text>

  <rect x="20" y="52" width="400" height="48" rx="9" fill="#64B08A" filter="url(#shadow)"/>
  <text x="32" y="81" font-size="14" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,PingFang SC,Microsoft YaHei,sans-serif" fill="#FFFFFF" font-weight="600">当前块：初始化触发器</text>

  <circle cx="30" cy="128" r="6" fill="#5E7FB5"/>
  <text x="44" y="133" font-size="13" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,PingFang SC,Microsoft YaHei,sans-serif" fill="#304A73">1. 项目启动后自动触发</text>

  <circle cx="30" cy="160" r="6" fill="#5E7FB5"/>
  <text x="44" y="165" font-size="13" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,PingFang SC,Microsoft YaHei,sans-serif" fill="#304A73">2. 接入初始化任务链</text>

  <circle cx="30" cy="192" r="6" fill="#5E7FB5"/>
  <text x="44" y="197" font-size="13" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,PingFang SC,Microsoft YaHei,sans-serif" fill="#304A73">3. 常用于开场设置</text>
</svg>
