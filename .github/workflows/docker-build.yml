name: Docker Build

on:
  workflow_call:
    secrets:
      TENCENT_REGISTRY_USERNAME:
        required: true
      TENCENT_REGISTRY_PASSWORD:
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract branch name
        id: branch
        run: echo "name=${GITHUB_REF##refs/heads/}" >> $GITHUB_OUTPUT

      - name: Prepare Docker tags
        id: tags
        run: |
          BRANCH="${{ steps.branch.outputs.name }}"
          IMAGE="ccr.ccs.tencentyun.com/${{ github.repository }}"
          TAGS="${IMAGE}:${BRANCH}"
          if [ "$BRANCH" = "publish" ]; then
            TAGS="${TAGS},${IMAGE}:latest"
          fi
          echo "tags=${TAGS}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Tencent Registry
        uses: docker/login-action@v3
        with:
          registry: ccr.ccs.tencentyun.com
          username: ${{ secrets.TENCENT_REGISTRY_USERNAME }}
          password: ${{ secrets.TENCENT_REGISTRY_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
